<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Informare</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f4f1;
    }

    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      background: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-style: italic;
      font-weight: 700;
      font-size: 16px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header p {
      font-size: 11px;
      color: #9a9a9a;
    }

    .body {
      padding: 16px 20px 20px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9a9a9a;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px;
      background: #fff;
      font-size: 13px;
      color: #1a1a1a;
      outline: none;
    }

    input:focus {
      border-color: #5b6af0;
      box-shadow: 0 0 0 2px rgba(91,106,240,0.12);
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #1a1a1a;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    .status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      display: none;
    }

    .status.ok {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
    }

    .status.err {
      background: #fdecea;
      color: #c62828;
      display: block;
    }

    .hint {
      margin-top: 14px;
      font-size: 11px;
      color: #9a9a9a;
      line-height: 1.5;
    }

    .hint strong { color: #555; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">i</div>
    <div>
      <h1>Informare</h1>
      <p>Personal knowledge capture</p>
    </div>
  </div>

  <div class="body">
    <div class="field">
      <label>App URL</label>
      <input id="appUrl" type="url" placeholder="https://your-app.vercel.app" />
    </div>

    <div class="field">
      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="Your EXTENSION_API_KEY" />
    </div>

    <button id="save">Save settings</button>

    <div id="status" class="status"></div>

    <p class="hint">
      Right-click any link, page, or selected text and choose
      <strong>"Add to informare"</strong> to save instantly.
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
